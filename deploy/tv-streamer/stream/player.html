<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TNCB TV Player 📺</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
            color: #fff;
        }
        .player-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background-color: #000;
        }
        
        /* Loading overlay */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(16, 20, 30, 0.95) 0%, #080b11 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 0.5s ease;
        }
        
        .spinner {
            width: 70px;
            height: 70px;
            border: 4px solid rgba(255, 255, 255, 0.05);
            border-top: 4px solid #06b6d4;
            border-radius: 50%;
            animation: spin 1s linear infinite, glow 2s ease-in-out infinite alternate;
            margin-bottom: 24px;
        }
        
        .status-text {
            font-size: 1.2rem;
            font-weight: 400;
            color: #9ca3af;
            letter-spacing: 0.05em;
            text-align: center;
            padding: 0 20px;
        }

        /* Large play button for autoplay blocking */
        .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 11;
            cursor: pointer;
        }

        .play-btn {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #a855f7 0%, #06b6d4 100%);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 2.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(6, 182, 212, 0.4);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
            padding-left: 8px; /* Offset to center the play icon */
        }

        .play-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 35px rgba(6, 182, 212, 0.6);
        }

        .play-label {
            margin-top: 18px;
            font-size: 1.1rem;
            color: #f3f4f6;
            font-weight: 500;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes glow {
            0% { box-shadow: 0 0 15px rgba(6, 182, 212, 0.2); }
            100% { box-shadow: 0 0 25px rgba(168, 85, 247, 0.4); }
        }
    </style>
    <!-- Hls.js script -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.10/dist/hls.min.js"></script>
</head>
<body>

<div class="player-container">
    <!-- Video Player -->
    <video id="video" controls autoplay playsinline></video>

    <!-- Loading Screen -->
    <div id="loading" class="overlay">
        <div class="spinner"></div>
        <div id="status-text" class="status-text">Đang khởi tạo trình phát...</div>
    </div>

    <!-- Custom Click to Play overlay (if autoplay is blocked) -->
    <div id="play-overlay" class="play-overlay" onclick="triggerPlay()">
        <button class="play-btn">▶</button>
        <div class="play-label">Nhấn để xem trực tiếp</div>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const loading = document.getElementById('loading');
    const playOverlay = document.getElementById('play-overlay');
    const statusText = document.getElementById('status-text');
    const streamUrl = 'live.m3u8';
    let hls = null;
    let retryTimeout = null;

    function setStatus(text, isLoading = true) {
        if (isLoading) {
            loading.style.opacity = '1';
            loading.style.pointerEvents = 'auto';
            statusText.textContent = text;
        } else {
            loading.style.opacity = '0';
            loading.style.pointerEvents = 'none';
        }
    }

    function triggerPlay() {
        video.play().then(() => {
            playOverlay.style.display = 'none';
        }).catch(err => {
            console.error("Lỗi khi phát video:", err);
        });
    }

    function checkAutoplay() {
        video.play().then(() => {
            console.log("Tự động phát thành công!");
            playOverlay.style.display = 'none';
        }).catch(err => {
            console.log("Trình duyệt chặn tự động phát. Hiển thị lớp phủ bắt đầu.");
            playOverlay.style.display = 'flex';
        });
    }

    function initPlayer() {
        // Hủy luồng hiện tại nếu có để giải phóng bộ nhớ
        if (hls) {
            hls.destroy();
            hls = null;
        }

        setStatus("Đang kiểm tra kết nối luồng phát...", true);

        if (Hls.isSupported()) {
            hls = new Hls({
                manifestLoadingTimeOut: 4000,
                manifestLoadingMaxRetry: 1,
                levelLoadingTimeOut: 4000,
                levelLoadingMaxRetry: 1,
                fragLoadingTimeOut: 8000,
                fragLoadingMaxRetry: 2,
                enableWorker: true,
                lowLatencyMode: true,
                backBufferLength: 5
            });

            hls.loadSource(streamUrl);
            hls.attachMedia(video);

            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                setStatus("", false);
                checkAutoplay();
            });

            hls.on(Hls.Events.ERROR, function(event, data) {
                console.warn("HLS.js Error:", data);
                if (data.fatal) {
                    setStatus("Chờ tín hiệu từ Server (live.m3u8)... Đang thử lại...", true);
                    if (hls) {
                        hls.destroy();
                        hls = null;
                    }
                    scheduleRetry();
                }
            });
        } 
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            // Trình phát HLS gốc (Safari, Edge cũ hoặc Smart TV)
            video.src = streamUrl;
            video.addEventListener('loadedmetadata', function() {
                setStatus("", false);
                checkAutoplay();
            });
            video.addEventListener('error', function() {
                setStatus("Không tìm thấy tệp stream. Thử lại sau 3 giây...", true);
                scheduleRetry();
            });
        } 
        else {
            setStatus("Trình duyệt này không hỗ trợ định dạng Live HLS (.m3u8).", true);
            // Vẫn thử lặp lại đề phòng sự cố tạm thời
            scheduleRetry();
        }
    }

    function scheduleRetry() {
        if (retryTimeout) clearTimeout(retryTimeout);
        retryTimeout = setTimeout(() => {
            initPlayer();
        }, 3000);
    }

    // Khởi chạy trình phát
    window.addEventListener('DOMContentLoaded', initPlayer);
</script>
</body>
</html>
