# ============================================
# TNCB Rent - Production-Ready Docker Compose Stack
# Orchestrates: Frontend, Backend, MongoDB, Redis, and Cloudflare Tunnel
# ============================================

version: '3.8'

# Global log rotation to prevent disk space exhaustion
x-logging: &default-logging
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  # 1. MongoDB Database Container
  mongodb:
    image: mongo:6.0-jammy
    container_name: tncb-mongodb
    restart: always
    <<: *default-logging
    volumes:
      - mongodb_data:/data/db
    networks:
      - tncb-network

  # 2. Redis Caching Layer
  redis:
    image: redis:7-alpine
    container_name: tncb-redis
    restart: always
    <<: *default-logging
    expose:
      - "6379"
    command: redis-server --requirepass strongredispassword
    networks:
      - tncb-network

  # 3. Node.js Express API Backend
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    container_name: tncb-backend
    restart: always
    <<: *default-logging
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/tncb
      - JWT_SECRET=your_production_jwt_secret_key_change_me
      - JWT_EXPIRES_IN=7d
      - GOOGLE_CLIENT_ID=933443619049-s3ko97thdke1f5al5snbvh3l7cck0t64.apps.googleusercontent.com
    networks:
      - tncb-network
    volumes:
      - tncb_uploads:/app/uploads
    depends_on:
      - mongodb
      - redis

  # 4. Frontend Web App (Nginx Serving React SPA + API Reverse Proxy)
  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
      args:
        - VITE_GOOGLE_CLIENT_ID=933443619049-s3ko97thdke1f5al5snbvh3l7cck0t64.apps.googleusercontent.com
    container_name: tncb-frontend
    restart: always
    <<: *default-logging
    ports:
      - "80:80"
    volumes:
      - ./power_report.html:/usr/share/nginx/html/power-report.html:ro
    networks:
      - tncb-network
    depends_on:
      - backend

  # 5. Cloudflare Tunnel Container (Secure access without open ports)
  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: tncb-cf-tunnel
    restart: always
    <<: *default-logging
    environment:
      # Replace this token with your actual Cloudflare Tunnel token in production
      - TUNNEL_TOKEN=YOUR_CLOUDFLARE_TUNNEL_TOKEN_HERE
    command: tunnel --no-autoupdate run
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - tncb-network
    depends_on:
      - frontend

  # 6. Netdata System Monitoring Container
  netdata:
    image: netdata/netdata:stable
    container_name: tncb-netdata
    user: "root"
    hostname: tncb-server
    restart: always
    <<: *default-logging
    ports:
      - "19999:19999"
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    volumes:
      - netdataconfig:/etc/netdata
      - netdatalib:/var/lib/netdata
      - netdatacache:/var/cache/netdata
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - tncb-network

volumes:
  mongodb_data:
    driver: local
  netdataconfig:
  netdatalib:
  netdatacache:
  tncb_uploads:

networks:
  tncb-network:
    driver: bridge
