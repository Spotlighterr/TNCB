version: '3.8'

services:
  tv-browser:
    image: kasmweb/chromium:1.15.0
    container_name: tv-browser-kasm
    ports:
      - "3030:6901" # Host port 3030 mapped to KasmVNC container port 6901 HTTPS
    environment:
      - VNC_PW=password # Access password
      - LAUNCH_URL=https://google.com # Default page when opening
    shm_size: '2gb'
    restart: unless-stopped
